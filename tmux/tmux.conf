#tmux_conf_battery_status_discharging="🔋"  # U+1F50B

# clock style (when you hit <prefix> + t)
# you may want to use %I:%M %p in place of %R in tmux_conf_theme_status_right
tmux_conf_theme_clock_colour="$tmux_conf_theme_colour_4"
tmux_conf_theme_clock_style="24"


# -- clipboard -----------------------------------------------------------------

# in copy mode, copying selection also copies to the OS clipboard
#   - true
#   - false (default)
#   - disabled
# on Linux, this requires xsel, xclip or wl-copy
tmux_conf_copy_to_os_clipboard=true


# -- urlscan -------------------------------------------------------------------

# options passed to urlscan
tmux_conf_urlscan_options="--compact --dedupe"


# -- user customizations -------------------------------------------------------

# this is the place to override or undo settings

# Pass Shift+Enter and Ctrl+Shift+U to applications (nvim)
# bind-key -T root S-Enter send-keys -x
# bind-key -T root C-S-u send-keys -x

# increase history size
#set -g history-limit 10000

# start with mouse mode enabled
set -g mouse on
set -g base-index 1
# force Vi mode
#   really you should export VISUAL or EDITOR environment variable, see manual
set -g status-keys vi
set -g mode-keys vi

# 启用 kitty 的 modifyOtherKeys 支持（透传修饰键）
set -as terminal-overrides ",xterm-kitty:Smkx=\E[>4u:Rmkx=\E[<4u"

# 通用扩展键盘协议支持（tmux 3.6+）
set-option -ga terminal-features ',*:extkeys'

# 解除 tmux 对 ctrl+shift+u/d 的绑定，让 kitty 的 modifyOtherKeys 处理
unbind -T root C-S-u
unbind -T root C-S-d

# replace C-b by C-a instead of using both prefixes
 set -gu prefix2
 unbind C-a
 unbind C-b
set -g prefix C-b
bind C-b send-prefix

# if you don't want Oh my tmux! to alter a binding, use #!important
# bind c new-window -c '#{pane_current_path}' #!important

# move status line to top
#set -g status-position top


# -- tpm -----------------------------------------------------------------------

# while I don't use tpm myself, many people requested official support so here
# is a seamless integration that automatically installs plugins in parallel

# whenever a plugin introduces a variable to be used in 'status-left' or
# 'status-right', you can use it in 'tmux_conf_theme_status_left' and
# 'tmux_conf_theme_status_right' variables.

# by default, launching tmux will update tpm and all plugins
#   - true (default)
#   - false
tmux_conf_update_plugins_on_launch=true

# by default, reloading the configuration will update tpm and all plugins
#   - true (default)
#   - false
tmux_conf_update_plugins_on_reload=true

# by default, reloading the configuration will uninstall tpm and plugins when no
# plugins are enabled
#   - true (default)
#   - false
tmux_conf_uninstall_plugins_on_reload=true

# /!\ the tpm bindings differ slightly from upstream:
#   - installing plugins: <prefix> + I
#   - uninstalling plugins: <prefix> + Alt + u
#   - updating plugins: <prefix> + u

# /!\ do not add set -g @plugin 'tmux-plugins/tpm'
# /!\ do not add run '~/.tmux/plugins/tpm/tpm'

# to enable a plugin, use the 'set -g @plugin' syntax:
# visit https://github.com/tmux-plugins for available plugins
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-quick-select'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'

# Pane 边框显示应用名称和用户
# set -g @catppuccin_pane_status_enabled "yes"
# set -g @catppuccin_pane_border_status "on"
# set -g pane-border-format "#{pane_current_command}#{?#{pane_at_end},, | #(ps -o user= -p #{pane_pid} 2>/dev/null | tr -d ' ')}"
# set -g pane-border-format "#{pane_name}: #{pane_current_command}#{?#{pane_at_end},, | #(ps -o user= -p #{pane_pid} 2>/dev/null | tr -d ' ')}"

# 自动设置 pane 名称为当前运行的程序
set-hook -g pane-focus-in "run-shell 'tmux select-pane -T \"#{pane_current_command}\"'; refresh-client -S"
set-hook -g pane-focus-out "run-shell 'tmux select-pane -T \"#{pane_current_command}\"'; refresh-client -S"


# 状态栏更新间隔（秒），低值让 su 后快速刷新
set -g status-interval 1

# 状态栏配置 - 左边显示会话，右边显示系统信息
set -g status-left "#[fg=#{@thm_mauve},bg=#{@thm_surface_0}]#[fg=#{@thm_crust},bg=#{@thm_mauve}] #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #S "
set -g status-right "#[fg=#{@thm_yellow},bg=#{@thm_surface_0}]#[fg=#{@thm_crust},bg=#{@thm_yellow}] #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #{cpu_percentage} #[fg=#{@thm_surface_0}]#[fg=#{@thm_green},bg=#{@thm_surface_0}]#[fg=#{@thm_crust},bg=#{@thm_green}]󰍛 #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #{ram_percentage} #[fg=#{@thm_surface_0}]#[fg=#{@thm_sapphire},bg=#{@thm_surface_0}]#[fg=#{@thm_crust},bg=#{@thm_sapphire}]󰔟 #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(uptime | sed -E 's/.*up[[:space:]]+//; s/,.*$//; s/ day(s)?/d/; s/ hr(s)?/h/; s/ min(s)?/m/') #[fg=#{@thm_surface_0}]#[fg=#{@thm_sky},bg=#{@thm_surface_0}]#[fg=#{@thm_crust},bg=#{@thm_sky}] #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(/home/ffmmx/.config/nvim/tmux/scripts/pane-user.sh)@#H #[fg=#{@thm_surface_0}]#{E:@catppuccin_status_date_time}"
set -g status-left-length 50
set -g status-right-length 200

set -g @continuum-restore 'on'

set -s allow-passthrough on


# -- custom variables ----------------------------------------------------------

# to define a custom #{foo} variable, define a POSIX shell function between the
# '# EOF' and the '# "$@"' lines. Please note that the opening brace { character
# must be on the same line as the function name otherwise the parse won't detect
# it.
#
# then, use #{foo} in e.g. the 'tmux_conf_theme_status_left' or the
# 'tmux_conf_theme_status_right' variables.

# ------------------------------------------------------------------------------
# Custom variables - shell functions for dynamic status line content
# ------------------------------------------------------------------------------
# # /!\ do not remove the previous line
# #     do not write below this line

# 强制覆盖窗口状态格式显示 zoomed 标记
set-hook -g client-session-change "setw -g window-status-format '#[fg=#11111b,bg=#{@thm_overlay_2}] #I #[fg=#cdd6f4,bg=#{@thm_surface_0}] #T #{?window_zoomed_flag,▣,}' ; setw -g window-status-current-format '#[fg=#11111b,bg=#{@thm_mauve}] #I #[fg=#cdd6f4,bg=#{@thm_surface_1}] #T #{?window_zoomed_flag,▣,}'"
set-hook -g client-attached "setw -g window-status-format '#[fg=#11111b,bg=#{@thm_overlay_2}] #I #[fg=#cdd6f4,bg=#{@thm_surface_0}] #T #{?window_zoomed_flag,▣,}' ; setw -g window-status-current-format '#[fg=#11111b,bg=#{@thm_mauve}] #I #[fg=#cdd6f4,bg=#{@thm_surface_1}] #T #{?window_zoomed_flag,▣,}'"


